<svg id="svg1" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
    <title>operator=arithmetic-with-huge-region</title>
    <desc>A filter region larger than the clamped layer must not crash feComposite arithmetic.</desc>

    <filter id="filter1" filterUnits="userSpaceOnUse" x="0" y="0" width="150" height="2000">
        <feFlood flood-color="blue"/>
        <feComposite operator="arithmetic" in2="SourceGraphic" k1="0" k2="1" k3="1" k4="0"/>
    </filter>
    <rect id="rect1" x="20" y="20" width="160" height="160" fill="seagreen" filter="url(#filter1)"/>

    <!-- image frame -->
    <rect id="frame" x="1" y="1" width="198" height="198" fill="none" stroke="black"/>
</svg>
